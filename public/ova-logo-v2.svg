<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer ring gradient: purple → teal -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Globe body gradient: dark teal -->
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a5f6e"/>
      <stop offset="100%" stop-color="#0a2e38"/>
    </radialGradient>

    <!-- Chip glow -->
    <radialGradient id="chipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Clip circle -->
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="82"/>
    </clipPath>
  </defs>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ringGrad)" stroke-width="5" opacity="0.9"/>

  <!-- Small accent dots on the ring -->
  <circle cx="100" cy="4"   r="4" fill="#7C3AED"/>
  <circle cx="196" cy="100" r="4" fill="#06B6D4"/>
  <circle cx="100" cy="196" r="3" fill="#7C3AED" opacity="0.6"/>
  <circle cx="4"   cy="100" r="3" fill="#06B6D4" opacity="0.6"/>

  <!-- Globe body -->
  <circle cx="100" cy="100" r="82" fill="url(#globeGrad)" filter="url(#shadow)"/>

  <!-- Globe grid lines (clipped to circle) -->
  <g clip-path="url(#circleClip)" fill="none" stroke="#2dd4bf" stroke-width="0.8" opacity="0.35">
    <!-- Horizontal latitude lines -->
    <ellipse cx="100" cy="100" rx="82" ry="22"/>
    <ellipse cx="100" cy="100" rx="82" ry="50"/>
    <ellipse cx="100" cy="100" rx="82" ry="72"/>
    <!-- Vertical longitude lines -->
    <ellipse cx="100" cy="100" rx="22" ry="82"/>
    <ellipse cx="100" cy="100" rx="50" ry="82"/>
    <ellipse cx="100" cy="100" rx="72" ry="82"/>
  </g>

  <!-- Network nodes & connecting lines -->
  <g clip-path="url(#circleClip)" stroke="#2dd4bf" stroke-width="0.9" opacity="0.55" fill="none">
    <line x1="100" y1="55"  x2="140" y2="75"/>
    <line x1="140" y1="75"  x2="158" y2="110"/>
    <line x1="158" y1="110" x2="135" y2="145"/>
    <line x1="135" y1="145" x2="95"  y2="155"/>
    <line x1="95"  y1="155" x2="60"  y2="138"/>
    <line x1="60"  y1="138" x2="45"  y2="105"/>
    <line x1="45"  y1="105" x2="62"  y2="72"/>
    <line x1="62"  y1="72"  x2="100" y2="55"/>
    <!-- inner diagonals -->
    <line x1="100" y1="55"  x2="95"  y2="155"/>
    <line x1="140" y1="75"  x2="60"  y2="138"/>
    <line x1="158" y1="110" x2="45"  y2="105"/>
  </g>

  <!-- Network node dots -->
  <g fill="#2dd4bf" opacity="0.8">
    <circle cx="100" cy="55"  r="3"/>
    <circle cx="140" cy="75"  r="3"/>
    <circle cx="158" cy="110" r="3"/>
    <circle cx="135" cy="145" r="3"/>
    <circle cx="95"  cy="155" r="3"/>
    <circle cx="60"  cy="138" r="3"/>
    <circle cx="45"  cy="105" r="3"/>
    <circle cx="62"  cy="72"  r="3"/>
  </g>

  <!-- Central CPU chip -->
  <rect x="88" y="88" width="24" height="24" rx="4" fill="url(#chipGlow)" opacity="0.95"/>
  <!-- Chip pins -->
  <g stroke="#FCD34D" stroke-width="1.5" opacity="0.8">
    <line x1="91"  y1="88" x2="91"  y2="83"/>
    <line x1="97"  y1="88" x2="97"  y2="83"/>
    <line x1="103" y1="88" x2="103" y2="83"/>
    <line x1="109" y1="88" x2="109" y2="83"/>
    <line x1="91"  y1="112" x2="91"  y2="117"/>
    <line x1="97"  y1="112" x2="97"  y2="117"/>
    <line x1="103" y1="112" x2="103" y2="117"/>
    <line x1="109" y1="112" x2="109" y2="117"/>
    <line x1="88"  y1="92"  x2="83"  y2="92"/>
    <line x1="88"  y1="100" x2="83"  y2="100"/>
    <line x1="88"  y1="108" x2="83"  y2="108"/>
    <line x1="112" y1="92"  x2="117" y2="92"/>
    <line x1="112" y1="100" x2="117" y2="100"/>
    <line x1="112" y1="108" x2="117" y2="108"/>
  </g>
  <!-- Inner chip detail -->
  <rect x="93" y="93" width="14" height="14" rx="2" fill="none" stroke="#FCD34D" stroke-width="0.8" opacity="0.6"/>
  <circle cx="100" cy="100" r="3" fill="#FFF" opacity="0.7"/>

  <!-- Brand text: O.V.A -->
  <text
    x="100" y="141"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="19"
    font-weight="900"
    letter-spacing="5"
    fill="white"
  >O.V.A</text>

  <!-- Brand text: WEBVICTECH -->
  <text
    x="100" y="157"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="10"
    font-weight="600"
    letter-spacing="3.5"
    fill="#94d8e8"
  >WEBVICTECH</text>
</svg>
